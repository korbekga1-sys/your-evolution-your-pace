  });
  filtered.forEach(function(q,i){
    var qc=dv("qcard","","border-top:2px solid "+ac(i));
    qc.innerHTML='<div style="font-size:9px;color:rgba(197,160,80,.3);letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px">'+q.g+(q.book?'<span style="color:rgba(90,143,212,.5)"> &middot; '+q.book+'</span>':"")+'</div>'
      +'<p class="qt">&ldquo;'+q.t+'&rdquo;</p>'
      +'<p class="qa" style="color:'+ac(i)+'">&mdash; '+q.a+'</p>';
    v.appendChild(qc);
  });
}
